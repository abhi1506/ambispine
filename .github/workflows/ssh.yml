name: Test SSH Connection
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Add SSH key securely
      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      # 2️⃣ Test SSH connection
      - name: Test SSH Connection
        run: ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "echo 'Connected '"
